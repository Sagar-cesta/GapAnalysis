# ============================================================
# LiteLLM PROXY SERVER CONFIGURATION
# ============================================================

model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

# ============================================================
# MCP SERVERS
# Direct integration — static PAT, no proxy layer
# ============================================================
mcp_servers:
  # ── Remote HTTP endpoint, Bearer token auth ──────────────────
  github:
    url: "https://api.githubcopilot.com/mcp/"
    auth_type: "bearer_token"
    auth_value: "os.environ/GITHUB_TOKEN"

  # ── Local stdio: fetches any URL, no auth needed ─────────────
  fetch:
    command: "uvx"
    args: ["mcp-server-fetch"]

  # ── Local stdio: read/write project files, no auth needed ────
  filesystem:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "C:\\Users\\SAGAR\\OneDrive\\Desktop\\Sagar\\Cesta Inc\\GapAnalysis"

