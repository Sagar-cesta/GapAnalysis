# ============================================================
# LiteLLM PROXY SERVER CONFIGURATION
# ============================================================

model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

# ============================================================
# MCP SERVERS
# Direct integration — static PAT, no proxy layer
# ============================================================
mcp_servers:
  # ── Remote HTTP endpoint, Bearer token auth ──────────────────
  github:
    url: "https://api.githubcopilot.com/mcp/"
    auth_type: "bearer_token"
    auth_value: "os.environ/GITHUB_TOKEN"

  # ── Remote HTTP endpoint, token embedded in URL ───────────────
  zapier:
    url: "os.environ/ZAPIER_MCP_URL"

  # ── Local stdio: fetches any URL, no auth needed ─────────────
  fetch:
    transport: stdio
    command: "C:\\Users\\SAGAR\\OneDrive\\Desktop\\Sagar\\Cesta Inc\\GapAnalysis\\venv_fetch\\Scripts\\python.exe"
    args: ["-m", "mcp_server_fetch"]

  # ── Local stdio: read/write project files, no auth needed ────
  filesystem:
    transport: stdio
    command: "C:\\Program Files\\nodejs\\npx.cmd"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "C:\\Users\\SAGAR\\OneDrive\\Desktop\\Sagar\\Cesta Inc\\GapAnalysis"

