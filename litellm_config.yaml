# ============================================================
# LiteLLM PROXY SERVER CONFIGURATION
# ============================================================

model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

# ============================================================
# MCP SERVERS
# Direct integration — static PAT, no proxy layer
# ============================================================
mcp_servers:
  # ── Remote HTTP endpoint, Bearer token auth ──────────────────
  github:
    url: "https://api.githubcopilot.com/mcp/"
    auth_type: "bearer_token"
    auth_value: "os.environ/GITHUB_TOKEN"

  # ── Remote HTTP endpoint, token embedded in URL ───────────────
  zapier:
    url: "os.environ/ZAPIER_MCP_URL"

  # ── Remote HTTP, OAuth2 PKCE (browser-only) ──────────────────
  # GAP: Figma's remote MCP rejects PATs — requires interactive
  # browser OAuth2 PKCE login. No headless/server-to-server support.
  figma:
    url: "https://mcp.figma.com/mcp"
    auth_type: "bearer_token"
    auth_value: "os.environ/FIGMA_TOKEN"

  # ── Remote HTTP, OAuth2 client_credentials ────────────────────
  # LiteLLM handles token fetch, cache, and refresh automatically
  pinkfish_websearch:
    url: "https://mcp.app.pinkfish.ai/web-search"
    auth_type: oauth2
    oauth2_flow: client_credentials
    client_id: "os.environ/PINKFISH_CLIENT_ID"
    client_secret: "os.environ/PINKFISH_CLIENT_SECRET"
    token_url: "https://app-api.app.pinkfish.ai/oauth/token"
    scopes:
      - "org:133738997602"

  pinkfish_weather:
    url: "https://mcp.app.pinkfish.ai/weather"
    auth_type: oauth2
    oauth2_flow: client_credentials
    client_id: "os.environ/PINKFISH_CLIENT_ID"
    client_secret: "os.environ/PINKFISH_CLIENT_SECRET"
    token_url: "https://app-api.app.pinkfish.ai/oauth/token"
    scopes:
      - "org:133738997602"

  pinkfish_salesforce:
    url: "https://mcp.app.pinkfish.ai/salesforce"
    auth_type: oauth2
    oauth2_flow: client_credentials
    client_id: "os.environ/PINKFISH_CLIENT_ID"
    client_secret: "os.environ/PINKFISH_CLIENT_SECRET"
    token_url: "https://app-api.app.pinkfish.ai/oauth/token"
    scopes:
      - "org:133738997602"

  pinkfish_excel:
    url: "https://mcp.app.pinkfish.ai/microsoft-excel"
    auth_type: oauth2
    oauth2_flow: client_credentials
    client_id: "os.environ/PINKFISH_CLIENT_ID"
    client_secret: "os.environ/PINKFISH_CLIENT_SECRET"
    token_url: "https://app-api.app.pinkfish.ai/oauth/token"
    scopes:
      - "org:133738997602"

