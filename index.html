<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
    }

    #sidebar h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7c85a8;
    }

    .server-group { display: flex; flex-direction: column; gap: 6px; }

    .server-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
      user-select: none;
    }
    .server-label:hover { background: #252840; }
    .server-label input { accent-color: #6366f1; width: 15px; height: 15px; cursor: pointer; }

    .server-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .tool-count {
      margin-left: auto;
      font-size: 11px;
      color: #7c85a8;
      background: #252840;
      padding: 2px 7px;
      border-radius: 99px;
    }

    #sidebar-footer {
      margin-top: auto;
      font-size: 12px;
      color: #4a5180;
      line-height: 1.6;
    }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e2235;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #header h1 { font-size: 18px; font-weight: 600; }
    #header span { font-size: 13px; color: #7c85a8; }

    #status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 780px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user   .bubble { background: #6366f1; color: #fff; border-bottom-right-radius: 4px; }
    .assistant .bubble { background: #1e2235; color: #e2e8f0; border-bottom-left-radius: 4px; }

    /* ── Tool call cards ── */
    .tool-card {
      background: #13151f;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      max-width: 680px;
    }
    .tool-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .tool-icon { font-size: 14px; }
    .tool-name { color: #a78bfa; }
    .tool-server {
      font-size: 10px;
      color: #7c85a8;
      background: #1e2235;
      padding: 1px 6px;
      border-radius: 99px;
      font-weight: 400;
    }
    .tool-args { color: #94a3b8; margin-bottom: 4px; }
    .tool-result { color: #86efac; border-top: 1px solid #1e2235; padding-top: 6px; margin-top: 4px; }
    .tool-result-label { color: #7c85a8; margin-bottom: 2px; }

    /* ── Thinking indicator ── */
    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 0 4px 4px;
      color: #7c85a8;
      font-size: 13px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #6366f1; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

    /* ── Input area ── */
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #1e2235;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #1e2235;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: #6366f1; }
    #input::placeholder { color: #4a5180; }

    #send-btn {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      align-self: flex-end;
    }
    #send-btn:hover:not(:disabled) { background: #5457d6; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty state ── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #4a5180;
      pointer-events: none;
    }
    #empty .icon { font-size: 40px; }
    #empty p { font-size: 15px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 99px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <h2>MCP Servers</h2>
  <div id="server-list" class="server-group">
    <span style="font-size:12px;color:#4a5180">Loading servers…</span>
  </div>
  <div id="sidebar-footer">
    Connected to LiteLLM · gpt-4o-mini<br>
    <span id="tool-total" style="color:#6366f1;font-weight:600"></span>
  </div>
</aside>

<!-- Main chat -->
<main id="main">
  <div id="header">
    <div id="status-dot"></div>
    <h1>MCP Chat</h1>
    <span>Ask anything — tools are called automatically</span>
  </div>

  <div id="messages">
    <div id="empty">
      <div class="icon">🤖</div>
      <p>Select servers in the sidebar and ask a question</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" rows="2" placeholder="Ask something… e.g. 'List my GitHub repos' or 'Search the web for AI news'"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</main>

<script>
  const API = 'http://localhost:5000';
  let servers = {};
  let allTools = [];

  // ── Load servers on start ──────────────────────────────────────────────────
  async function loadServers() {
    try {
      const res = await fetch(`${API}/api/tools`);
      const data = await res.json();
      servers = data.servers;
      allTools = data.tools;

      document.getElementById('tool-total').textContent =
        `${data.total} tools across ${Object.keys(servers).length} servers`;

      const list = document.getElementById('server-list');
      list.innerHTML = '';

      if (!data.litellm_up) {
        list.innerHTML = `<span style="color:#ef4444;font-size:12px">⚠ LiteLLM offline<br><span style="color:#4a5180">Start it with:<br>litellm --config litellm_config.yaml</span></span>`;
        document.getElementById('status-dot').style.background = '#f59e0b';
        document.getElementById('tool-total').textContent = 'LiteLLM not running';
        return;
      }

      const colors = ['#6366f1','#22c55e','#f59e0b','#ec4899','#06b6d4','#a78bfa'];
      Object.entries(servers).forEach(([name, toolNames], i) => {
        const label = document.createElement('label');
        label.className = 'server-label';
        label.innerHTML = `
          <input type="checkbox" value="${name}" checked />
          <span class="server-dot" style="background:${colors[i % colors.length]}"></span>
          <span>${name}</span>
          <span class="tool-count">${toolNames.length}</span>
        `;
        list.appendChild(label);
      });
    } catch (e) {
      document.getElementById('server-list').innerHTML =
        `<span style="color:#ef4444;font-size:12px">⚠ Cannot reach app.py on port 5000</span>`;
      document.getElementById('status-dot').style.background = '#ef4444';
    }
  }

  // ── Get selected servers ───────────────────────────────────────────────────
  function getSelectedServers() {
    return [...document.querySelectorAll('#server-list input:checked')]
      .map(cb => cb.value);
  }

  // ── Append elements to chat ────────────────────────────────────────────────
  function removeEmpty() {
    const el = document.getElementById('empty');
    if (el) el.remove();
  }

  function addMessage(role, text) {
    removeEmpty();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);
    document.getElementById('messages').appendChild(wrap);
    scroll();
    return bubble;
  }

  function addThinking() {
    removeEmpty();
    const el = document.createElement('div');
    el.id = 'thinking';
    el.className = 'thinking';
    el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:4px">Thinking…</span>';
    document.getElementById('messages').appendChild(el);
    scroll();
    return el;
  }

  function removeThinking() {
    document.getElementById('thinking')?.remove();
  }

  function addToolCard(toolName, args, redirect) {
    removeThinking();
    removeEmpty();
    const server = toolName.split('-')[0];
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.id = `tool-${toolName}-${Date.now()}`;
    card.innerHTML = `
      <div class="tool-card-header">
        <span class="tool-icon">🔧</span>
        <span class="tool-name">${toolName}</span>
        <span class="tool-server">${server}</span>
        ${redirect ? `<span style="color:#f59e0b;font-size:10px;margin-left:auto">↪ redirected</span>` : ''}
      </div>
      ${redirect ? `<div style="color:#f59e0b;font-size:11px;margin-bottom:4px">⚠ ${redirect}</div>` : ''}
      <div class="tool-args">${JSON.stringify(args, null, 2).slice(0, 300)}</div>
      <div class="tool-result-pending" style="color:#7c85a8;font-size:11px">Running…</div>
    `;
    document.getElementById('messages').appendChild(card);
    scroll();
    return card;
  }

  function updateToolCard(card, result) {
    card.querySelector('.tool-result-pending')?.remove();
    const res = document.createElement('div');
    res.className = 'tool-result';
    res.innerHTML = `<div class="tool-result-label">Result</div>${escapeHtml(result.slice(0, 500))}${result.length > 500 ? '…' : ''}`;
    card.appendChild(res);
    scroll();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scroll() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Send message ───────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const btn   = document.getElementById('send-btn');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    btn.disabled = true;

    addMessage('user', text);
    const thinking = addThinking();

    const selectedServers = getSelectedServers();
    let lastToolCard = null;

    try {
      const resp = await fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, selected_servers: selectedServers }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          const lines = part.trim().split('\n');
          let event = '', data = '';
          for (const line of lines) {
            if (line.startsWith('event:')) event = line.slice(6).trim();
            if (line.startsWith('data:'))  data  = line.slice(5).trim();
          }
          if (!event || !data) continue;

          const payload = JSON.parse(data);

          if (event === 'status') {
            // Update thinking indicator with tool count
            const th = document.getElementById('thinking');
            if (th) {
              th.querySelector('span:last-child').textContent =
                `Thinking… (${payload.tools_loaded} tools available)`;
            }
          }
          if (event === 'tool_call') {
            removeThinking();
            lastToolCard = addToolCard(payload.tool, payload.arguments, payload.redirect);
          }
          if (event === 'tool_result' && lastToolCard) {
            updateToolCard(lastToolCard, payload.result);
            lastToolCard = null;
            addThinking();
          }
          if (event === 'answer') {
            removeThinking();
            addMessage('assistant', payload.text);
          }
          if (event === 'error') {
            removeThinking();
            addMessage('assistant', '⚠ Error: ' + payload.message);
          }
        }
      }
    } catch (e) {
      removeThinking();
      addMessage('assistant', '⚠ Could not reach the server: ' + e.message);
    }

    btn.disabled = false;
    input.focus();
  }

  // Enter to send (Shift+Enter for newline)
  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  loadServers();
</script>
</body>
</html>
